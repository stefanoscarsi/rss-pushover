name: RSS Check

on:
  schedule:
    - cron: '*/10 * * * *'   # ogni 10 minuti
  workflow_dispatch:           # run manuale per test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSS checker
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
        run: python checker.py

      - name: Commit seen.json
        run: |
          git config user.name  "rss-bot"
          git config user.email "rss-bot@users.noreply.github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "chore: update seen.json"
          git pull --rebase origin main
          git push
